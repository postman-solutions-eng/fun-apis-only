$kind: http-request
description: |-
  **Summarization** models specialize in synopsizing longer text into shorter text.

  See available [Summarization models](https://huggingface.co/models?pipeline_tag=summarization&sort=trending)

  ### Example models

  | model | description |
  | --- | --- |
  | [facebook/bart-large-cnn](https://huggingface.co/facebook/bart-large-cnn) | BART (large-sized model), fine-tuned on CNN Daily Mail |
  | [knkarthick/MEETING_SUMMARY](https://huggingface.co/knkarthick/MEETING_SUMMARY) | For meeting summarization |
url: "{{baseUrl}}/models/:model"
method: POST
pathVariables:
  model: facebook/bart-large-cnn
body:
  type: json
  content: |-
    {
      "inputs": "The tower is 324 metres (1,063 ft) tall, about the same height as an 81-storey building, and the tallest structure in Paris. Its base is square, measuring 125 metres (410 ft) on each side. During its construction, the Eiffel Tower surpassed the Washington Monument to become the tallest man-made structure in the world, a title it held for 41 years until the Chrysler Building in New York City was finished in 1930. It was the first structure to reach a height of 300 metres. Due to the addition of a broadcasting aerial at the top of the tower in 1957, it is now taller than the Chrysler Building by 5.2 metres (17 ft). Excluding transmitters, the Eiffel Tower is the second tallest free-standing structure in France after the Millau Viaduct."
    }
examples: ./.resources/Summarization.resources/examples
order: 6000
