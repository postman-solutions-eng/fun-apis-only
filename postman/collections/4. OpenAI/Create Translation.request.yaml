$kind: http-request
description: |-
  This API endpoint allows you to add audio translations. It is an HTTP POST request that should be sent to `{{baseUrl}}/audio/translations`.

  ### Request Parameters

  The request should include the following parameters:

  - `text` (string): The text to be translated. This parameter is required.
      

  ### Response

  The response will have a status code of 400 if there is an error. The error object in the response will provide additional details about the error, including the error message, type, parameter, and code.

  ### Examples

  #### Request

  ```
  POST {{baseUrl}}/audio/translations
  Content-Type: application/json
  {
    "text": "Hello world"
  }

   ```

  #### Response

  ```
  Status: 400
  {
    "error": {
      "message": "",
      "type": "",
      "param": null,
      "code": null
    }
  }

   ```

  #### Example Response

  ```
  {
    "text": ""
  }

   ```
url: "{{baseUrl}}/audio/translations"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: file
      key: file
      src: ""
      description: |
        (Required) The audio file to translate, in one of these formats: mp3, mp4, mpeg, mpga, m4a, wav, or webm.
    - type: text
      key: model
      value: whisper-1
      description: |
        (Required) ID of the model to use. Only `whisper-1` is currently available.
    - type: text
      key: prompt
      value: Some style context for the translation.
      description: |
        An optional text to guide the model's style or continue a previous audio segment. The [prompt](/docs/guides/speech-to-text/prompting) should be in English.
      disabled: true
    - type: text
      key: response_format
      value: json
      description: |
        The format of the transcript output, in one of these options: json, text, srt, verbose_json, or vtt.
    - type: text
      key: temperature
      value: "0"
      description: |
        The sampling temperature, between 0 and 1. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic. If set to 0, the model will use [log probability](https://en.wikipedia.org/wiki/Log_probability) to automatically increase the temperature until certain thresholds are hit.
    - type: text
      key: language
      value: ja
      description: Language of the audio
      disabled: true
examples: ./.resources/Create Translation.resources/examples
order: 9000
