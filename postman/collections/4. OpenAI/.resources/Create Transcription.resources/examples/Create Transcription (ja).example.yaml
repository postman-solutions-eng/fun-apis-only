$kind: http-example
request:
  url: "{{baseUrl}}/audio/transcriptions"
  method: POST
  headers:
    Accept: application/json
  body:
    type: formdata
    content:
      - type: file
        key: file
        src: AaawrMVdk/example-ja.m4a
        description: |
          (Required) The audio file to transcribe, in one of these formats: mp3, mp4, mpeg, mpga, m4a, wav, or webm.
      - type: text
        key: model
        value: whisper-1
        description: |
          (Required) ID of the model to use. Only `whisper-1` is currently available.
      - type: text
        key: prompt
        value: let me tell you some context about this audio
        description: |
          An optional text to guide the model's style or continue a previous audio segment. The [prompt](/docs/guides/speech-to-text/prompting) should match the audio language.
        disabled: true
      - type: text
        key: response_format
        value: json
        description: |
          The format of the transcript output, in one of these options: json, text, srt, verbose_json, or vtt.
      - type: text
        key: temperature
        value: "0"
        description: |
          The sampling temperature, between 0 and 1. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic. If set to 0, the model will use [log probability](https://en.wikipedia.org/wiki/Log_probability) to automatically increase the temperature until certain thresholds are hit.
      - type: text
        key: language
        value: ja
        description: |
          The language of the input audio. Supplying the input language in [ISO-639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) format will improve accuracy and latency.
      - type: text
        key: transcription
        value: srt
        description: |-
          Choose the format for the transcription
          Allowed values:plain text, srt, vtt
          Default value: plain text
        disabled: true
response:
  statusCode: 200
  statusText: OK
  headers:
    Date: Thu, 23 Mar 2023 01:20:35 GMT
    Content-Type: application/json
    Content-Length: "38"
    Connection: keep-alive
    Openai-Organization: user-aaaaa
    Openai-Processing-Ms: "716"
    Openai-Version: 2020-10-01
    Strict-Transport-Security: max-age=15724800; includeSubDomains
    X-Ratelimit-Limit-Requests: "3000"
    X-Ratelimit-Remaining-Requests: "2999"
    X-Ratelimit-Reset-Requests: 20ms
    X-Request-Id: e3d040d53b2241b45f884c65b1a10a2b
  body:
    type: json
    content: |-
      {
          "text": "これはテストです。"
      }
order: 2000
