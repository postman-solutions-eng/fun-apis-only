$kind: http-request
url: "{{render}}/api/spells"
method: GET
scripts:
  - type: afterResponse
    code: "var template = `\r

      \r

      <html>\r

      <head>\r

      \    <script src=\"https://cdn.jsdelivr.net/npm/jquery@3.4.1/dist/jquery.min.js\"></script>\r

      \    <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css\" integrity=\"sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO\"\r

      \        crossorigin=\"anonymous\">\r

      \    <link rel=\"stylesheet\" media=\"screen\" href=\"https://fontlibrary.org//face/bluu\" type=\"text/css\"/>\r

      \    <style type=\"text/css\">\r

      \        body { font-size: 1em; background: #221E4E; padding: 2em; font-family: 'BluuNextBoldItalic', serif;}\r

      \        .card { border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,.15); -webkit-box-shadow: 0 4px 10px rgba(0,0,0,.15); -moz-box-shadow: 0 4px 10px rgba(0,0,0,.15); background-color: #F1E6BA;}\r

      \        .card-topper { border-top-right-radius: 8px; border-top-left-radius: 8px; padding: 8px 16px; font-size: 2em; font-weight: 600; text-align: center; background-color: #312823; color: #ffffff;}\r

      \        .pic { max-width: 270px; max-height: 200px; padding-bottom: 1em; width: auto; height: auto;}\r

      \        .titles {font-family: serif;}\r

      \        #test { border: 2px solid black;}\r

      \        #test td { border: 1px solid black;}\r

      \    </style>\r

      </head>\r

      <body>\r

      \    <div class=\"container-fluid\">\r

      \        <div class=\"row\">\r

      \            {{#each response}}\r

      \            <div class=\"col-sm-6 col-lg-4 col-xl-3 mb-5\">\r

      \                <div class=\"card\">\r

      \                    <div class=\"card-topper card-img-top\">{{name}}</div>\r

      \                    <div class=\"card-body\">\r

      \                        <img class=\"rounded mx-auto d-block pic\" src=\"{{image}}\">\r

      \                        <div class=\"table-responsive\">\r

      \                        <table id=\"test\" class=\"table table-bordered table-hover\">\r

      \                            <tbody>\r

      \                                <tr>\r

      \                                    <td class=\"titles\">Spell</td>\r

      \                                    <td class=\"house text-center\">{{name}}</td>\r

      \                                </tr>\r

      \                                <tr>\r

      \                                    <td class=\"titles\">Description</td>\r

      \                                    <td class=\"text-center\">{{description}}</td>\r

      \                                </tr>\r

      \                        </table>\r

      \                        </div>\r

      \                    </div>\r

      \                </div>\r

      \            </div>\r

      \            {{/each}}\r

      \        </div>\r

      \    </div>\r

      </body>\r

      </html>\r

      `;\r

      \r

      \r

      pm.visualizer.set(template, {\r

      \    response: pm.response.json()\r

      });\r\n"
    language: text/javascript
examples: ./.resources/Spells.resources/examples
order: 6000
