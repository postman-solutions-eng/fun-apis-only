$kind: http-request
description: Creates a completion for the provided prompt and parameters.
url: "{{openAIUrl}}/completions"
method: POST
body:
  type: json
  content: |-
    {
        "model": "gpt-3.5-turbo-instruct",
        "prompt": "The specific product name or service, cradlepoint is mostly known for is ",
        "temperature": 0.3,
        "max_tokens": 100,
        "frequency_penalty" : -1

    }
order: 2000
