$kind: http-request
url: "{{openAIUrl}}/chat/completions"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
        "model": "gpt-3.5-turbo",
        "messages": [
            {
                "role": "system",
                "content": "You are a helpful assistant like GitHub Co-Pilot that understands source code and can explain it on a high level"
            },
            {
                "role": "user",
                "content": "Explain what the GitHub repository https://github.com/postman-solutions-eng/aippealing-companies-impl-openai is doing"
            }
        ],
        "temperature": 0.3,
        "max_tokens": 200
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = null;

      try {
          jsonData = pm.response.json();
          pm.test("Check if response is valid JSON", function() {    
          pm.expect(jsonData).to.be.an('object');
          pm.visualizer.set(`<textarea style="width: 100vw; height: 100vh; font-family: monospace;">${pm.response.json().choices[0].message.content}</textarea>`);
      });
      } catch (a) {
          console.log("Dealing with an SSE stream ... ")
      }
    language: text/javascript
examples: ./.resources/Explain A(i)ppealing companies API.resources/examples
order: 11000
