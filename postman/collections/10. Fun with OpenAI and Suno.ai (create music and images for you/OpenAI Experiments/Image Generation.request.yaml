$kind: http-request
description: Creates an image given a prompt.
url: "{{openAIUrl}}/images/generations"
method: POST
body:
  type: json
  content: |
    {
      "prompt": "An astronaut with british and portuguese flags on his suit eating German bratwurst",
      "n": 1,
      "size": "1024x1024",
      "model": "dall-e-3"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();

      var html = '';

      for (let i = 0; i < jsonData.data.length; i++) {
          html += '<img src="' + jsonData.data[i].url + '" width="1024">';
      }

      pm.visualizer.set(html);
    language: text/javascript
examples: ./.resources/Image Generation.resources/examples
order: 3000
