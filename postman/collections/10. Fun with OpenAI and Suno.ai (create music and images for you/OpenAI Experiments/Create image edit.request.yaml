$kind: http-request
description: Creates a variation of a given image.
url: "{{openAIUrl}}/images/edits"
method: POST
body:
  type: formdata
  content:
    - type: file
      key: image
      src: /Users/johannesnicolai/Downloads/original.png
      description: The image to edit. Must be a valid PNG file, less than 4MB, and square. If mask is not provided, image must have transparency, which will be used as the mask.
    - type: file
      key: mask
      src: /Users/johannesnicolai/Downloads/original_mask.png
      description: An additional image whose fully transparent areas (e.g. where alpha is zero) indicate where image should be edited. Must be a valid PNG file, less than 4MB, and have the same dimensions as image.
    - type: text
      key: prompt
      value: excited, sparkling, heart eyes
      description: A text description of the desired image(s). The maximum length is 1000 characters.
    - type: text
      key: n
      value: "2"
      description: The number of images to generate. Must be between 1 and 10.
    - type: text
      key: size
      value: 1024x1024
      description: The size of the generated images. Must be one of 256x256, 512x512, or 1024x1024.
    - type: text
      key: response_format
      value: url
      description: The format in which the generated images are returned. Must be one of url or b64_json.
    - type: text
      key: user
      value: ""
      description: A unique identifier representing your end-user, which can help OpenAI to monitor and detect abuse.
      disabled: true
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();

      var html = '';

      for (let i = 0; i < jsonData.data.length; i++) {
          html += '<img src="' + jsonData.data[i].url + '" width="512">';
      }

      pm.visualizer.set(html);
    language: text/javascript
examples: ./.resources/Create image edit.resources/examples
order: 6000
