$kind: http-request
url: "{{openAIUrl}}/audio/translations"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: file
      key: file
      src: AeDEhscRo/paulaner.mp3
      description: |
        (Required) The audio file to translate, in one of these formats: mp3, mp4, mpeg, mpga, m4a, wav, or webm.
    - type: text
      key: model
      value: whisper-1
      description: |
        (Required) ID of the model to use. Only `whisper-1` is currently available.
    - type: text
      key: prompt
      value: Some style context for the translation.
      description: |
        An optional text to guide the model's style or continue a previous audio segment. The [prompt](/docs/guides/speech-to-text/prompting) should be in English.
      disabled: true
    - type: text
      key: response_format
      value: json
      description: |
        The format of the transcript output, in one of these options: json, text, srt, verbose_json, or vtt.
    - type: text
      key: temperature
      value: "0"
      description: |
        The sampling temperature, between 0 and 1. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic. If set to 0, the model will use [log probability](https://en.wikipedia.org/wiki/Log_probability) to automatically increase the temperature until certain thresholds are hit.
    - type: text
      key: language
      value: ja
      description: Language of the audio
      disabled: true
scripts:
  - type: afterResponse
    code: |-
      var jsonData = null;

      try {
          jsonData = pm.response.json();
          pm.test("Check if response is valid JSON", function() {    
          pm.expect(jsonData).to.be.an('object');
          pm.visualizer.set(`<textarea style="width: 100vw; height: 100vh; font-family: monospace;">${pm.response.json().text}</textarea>`);
      });
      } catch (a) {
          console.log("Dealing with an SSE stream ... ")
      }
    language: text/javascript
examples: ./.resources/Create Audio Translation.resources/examples
order: 8000
