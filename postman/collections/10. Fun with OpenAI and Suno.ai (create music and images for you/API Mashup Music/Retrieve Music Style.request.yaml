$kind: http-request
description: Creates a completion for the provided prompt and parameters.
url: "{{openAIUrl}}/chat/completions"
method: POST
body:
  type: json
  content: |
    {
        "model": "gpt-4o",
        "messages": [
            {
                "role": "user",
                "content": [
                        {
                            "type": "text",
                            "text": "Complete the following sentence with one to five words, do not add another sentence, do not repeat the beginning of the sentence, do not include the full stop at the end of the sentence: If one would need to associate one music style with company {{company}} it would be "
                        }
                        
                ]
            }
        ],
        "temperature": 0.2,
        "n": 1,
        "stream": false,
        "max_tokens": 50,
        "presence_penalty": 0,
        "frequency_penalty": 0
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      var jsonData = null;

      try {
          jsonData = pm.response.json();
          pm.test("Check if response is valid JSON", function() {    
          pm.expect(jsonData).to.be.an('object');
          pm.visualizer.set(`<textarea style="width: 100vw; height: 100vh; font-family: monospace;">${pm.response.json().choices[0].message.content}</textarea>`);
      });
      } catch (a) {
          console.log("Dealing with an SSE stream ... ")
      }

      // set result as a collection variable
      pm.collectionVariables.set("musicStyle", pm.response.json().choices[0].message.content);
    language: text/javascript
order: 2000
