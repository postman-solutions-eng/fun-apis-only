$kind: http-request
url: https://postman-echo.com/post?company=Siemens Healthineers&language=English&statusCode=401
method: POST
queryParams:
  - key: company
    value: Siemens Healthineers
  - key: language
    value: English
    description: language to use for songs and other media
  - key: statusCode
    value: "401"
    description: status code to sing about
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {

      \    pm.response.to.have.status(200);

      });



      var jsonData = pm.response.json();


      // test whether company field is not blank

      pm.test(\"Company field is not blank\", function () {

      \    pm.expect(jsonData.args.company).to.not.be.empty;

      \    // save company to a collection variable

      \    pm.collectionVariables.set(\"company\", jsonData.args.company);


      \    // remove all special characters from company name and only use small letters

      \    var companyId = jsonData.args.company.replace(/[^a-zA-Z0-9]/g, \"\").toLowerCase();


      \    // save company id to a collection variable

      \    pm.collectionVariables.set(\"companyId\", companyId);

      })


      pm.test(\"Language Field is not blank and should be saved to collection variable with same name\", function () {

      \     var responseBody = pm.response.json();

      \     pm.expect(responseBody.args.language).to.exist.and.to.not.equal(\"\", \"Language field should not be blank\");

      \     pm.collectionVariables.set(\"language\", responseBody.args.language);

      });


      pm.test(\"statusCode field is not blank and statusCode can be parsed into a number and should be saved to collection variable with same name\", function () {

      \    var responseBody = pm.response.json().args;

      \    pm.expect(responseBody.statusCode).to.exist.and.to.not.equal(\"\");

      \    pm.expect(parseInt(responseBody.statusCode)).to.not.be.NaN;

      \    pm.collectionVariables.set(\"statusCode\", parseInt(responseBody.statusCode));

      });

      \   "
    language: text/javascript
order: 1000
